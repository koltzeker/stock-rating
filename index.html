// ── Helpers ───────────────────────────────────────────────────────────────────
function mkStock(t) {
  const d = { ticker:t, price:null, lastUpdated:null, fetchStatus:"idle", fetchError:"",
              news:[], bonus:{score:"",reason:""}, mkt:{scores:[0,0],rawData:{},aiReason:""}, isBiotech:false };
  CATS.forEach(c => {
    d[c.id] = { scores:new Array(c.params.length).fill(null),
      patterns: c.patterns ? new Array(c.patterns.length).fill(false) : [],
      rawData:{}, aiReason:"", note:"", autoDetected:[] };
  });
  return d;
}

const makeLbl  = p => (p>=0?"+":"")+p.toFixed(2)+"%";
const nqToScore= p => p>=2?10:p>=1?8:p>0?6:p===0?5:p>=-1?4:p>=-2?2:1;
const sCol     = (v,T) => { if(v===null) return "#374151"; if(T) return v>=70?"#10b981":v>=40?"#f59e0b":"#ef4444"; return v>=7?"#10b981":v>=4?"#f59e0b":"#ef4444"; };

function isBiotech(s) {
  return s.isBiotech===true;
}

function getWeights(s) {
  return isBiotech(s)
    ? [{id:"fund",w:0.12},{id:"tech",w:0.39},{id:"mom",w:0.39},{id:"mkt",w:0.1}]
    : [{id:"fund",w:0.3}, {id:"tech",w:0.3}, {id:"mom",w:0.3}, {id:"mkt",w:0.1}];
}

function catAvg(s, id) {
  if(!s[id]) return null;
  // Keep score 0 as a valid score — only filter out null/undefined
  const vals = (s[id].scores||[]).filter(v=>v!==null&&v!==undefined);
  if(id==="tech") { if((s.tech?.patterns||[]).some(Boolean)) vals.push(10); }
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}

function catAvgFund(s) {
  const sc = s.fund?.scores||[];
  const weights = [0.4,0.4,0.2];
  let sum=0, wSum=0;
  sc.forEach((v,i)=>{ if(v){ sum+=v*weights[i]; wSum+=weights[i]; } });
  return wSum ? sum/wSum : null;
}

function catAvgById(s, id) {
  return id==="fund" ? catAvgFund(s) : catAvg(s, id);
}

const bonusVal = s => { const n=parseFloat(s.bonus?.score); return isNaN(n)?0:Math.min(10,Math.max(0,n)); };

function total(s) {
  const w = getWeights(s);
  let sum=0, wSum=0;
  w.forEach(({id,w:wt}) => { const v=catAvgById(s,id); if(v!==null){sum+=v*wt*10; wSum+=wt;} });
  if(!wSum) return null;
  // sum already accounts for weights — no need to divide by wSum again
  const normalized = wSum < 1 ? sum / wSum : sum;
  return Math.min(110, normalized + bonusVal(s));
}

function extractJSON(text) {
  const clean = text.replace(/```json|```/g,"").trim();
  try { return JSON.parse(clean); } catch {}
  // Try to find an object {...} or array [...]
  const firstObj = clean.indexOf("{");
  const firstArr = clean.indexOf("[");
  const useArr = firstArr !== -1 && (firstObj === -1 || firstArr < firstObj);
  const openChar  = useArr ? "[" : "{";
  const closeChar = useArr ? "]" : "}";
  let depth=0, start=-1, end=-1;
  for(let i=0;i<clean.length;i++) {
    if(clean[i]===openChar)  { if(depth===0) start=i; depth++; }
    else if(clean[i]===closeChar) { depth--; if(depth===0){end=i;break;} }
  }
  if(start===-1||end===-1) return null;
  try { return JSON.parse(clean.slice(start,end+1)); } catch {
    try { return JSON.parse(clean.slice(start,end+1).replace(/,(\s*[}\]])/g,"$1")); } catch { return null; }
  }
}

// ── Market fetch (via Claude web_search — only allowed domain) ────────────────
async function yahooFetch(symbol) {
  // Use allorigins proxy to bypass CORS when opened from file://
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`;
  const res = await fetch(proxyUrl);
  if(!res.ok) throw new Error(res.status);
  const wrapper = await res.json();
  const data = JSON.parse(wrapper.contents);
  return data?.chart?.result?.[0]?.meta;
}

async function fetchBothMarkets() {
  const fetchPct = async (symbol) => {
    const meta = await yahooFetch(symbol);
    if(!meta) throw new Error("no meta");
    const price = meta.regularMarketPrice;
    const prev  = meta.chartPreviousClose ?? meta.previousClose;
    if(!price || !prev) throw new Error("no price/prev");
    return Math.round((price - prev) / prev * 10000) / 100;
  };
  const [sp, nq] = await Promise.all([
    fetchPct("SPY").catch(() => null),
    fetchPct("QQQ").catch(() => null),
  ]);
  return { sp, nq };
}// ── Live price from Yahoo Finance ─────────────────────────────────────────────
async function fetchLivePrice(ticker) {
  try {
    const meta = await yahooFetch(ticker);
    return meta?.regularMarketPrice || meta?.previousClose || null;
  } catch(e) {
    console.warn("fetchLivePrice failed:", e.message);
    return null;
  }
}

// ── Stock AI fetch ────────────────────────────────────────────────────────────
async function fetchAndScoreViaAI(ticker) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 55000);
  let res, data;
  try {
    res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      signal: controller.signal,
      body: JSON.stringify({
        model:"claude-haiku-4-5-20251001", max_tokens:1000,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:
          'Search "'+ticker+' stock price revenue gross margin EBITDA MA50 volume 52week high weekly performance 2025 2026". ' +
          'Return ONLY valid JSON, no markdown:\n' +
          '{"price":0,' +
          '"fundRaw":{"revenue_growth":"","gross_margin":"","ebitda":""},' +
          '"techRaw":{"ma50":"","day_high":"","week_high":"","volume":"","avg_volume":"","vol_ratio":"","high_52w":""},' +
          '"momRaw":{"weekly_change":"","monthly_change":"","ytd":"","vol_change":""},' +
          '"news":[{"date":"YYYY-MM-DD","type":"news","text":"headline"}],' +
          '"fundScores":[5,5,5],' +
          '"techScores":[5,5,5,5,5,5],' +
          '"momScores":[5,5,5],' +
          '"detectedPatterns":[],' +
          '"fundReason":"","techReason":"","momReason":""}'
        }]
      })
    });
    data = await res.json();
  } catch(e) {
    throw new Error(e.name==="AbortError" ? "תם הזמן (55 שניות) — נסה שוב" : "שגיאת רשת: "+e.message);
  } finally { clearTimeout(timeout); }

  if(data.error) throw new Error(data.error.message);
  const text = (data.content||[]).map(b=>b.type==="text"?b.text:"").join("");
  const d = extractJSON(text);
  if(!d||!d.price) throw new Error("טיקר לא נמצא");

  const sc = arr => (arr||[]).map(v=>Math.min(10,Math.max(0,Number(v)||0)));
  const fR=d.fundRaw||{}, tR=d.techRaw||{}, mR=d.momRaw||{};
  return {
    price: d.price,
    fundRaw:{"צמיחת הכנסות YoY":fR.revenue_growth||"","שולי רווח גולמי":fR.gross_margin||"","EBITDA":fR.ebitda||""},
    techRaw:{"MA50":tR.ma50||"","גבוה יומי":tR.day_high||"","גבוה שבועי":tR.week_high||"","נפח היום":tR.volume||"","נפח ממוצע20":tR.avg_volume||"","יחס נפח":tR.vol_ratio||"","52W High":tR.high_52w||""},
    momRaw:{"שינוי שבועי":mR.weekly_change||"","שינוי חודשי":mR.monthly_change||"","YTD":mR.ytd||"","שינוי נפח":mR.vol_change||""},
    news: (d.news||[]).slice(0,6).map(n=>({...n,auto:true})),
    fundScores:  sc(d.fundScores||[0,0,0]),
    techScores:  sc(d.techScores||[0,0,0,0,0,0]),
    momScores:   sc(d.momScores||[0,0,0]),
    detectedPatterns: d.detectedPatterns||[],
    fundReason:d.fundReason||"", techReason:d.techReason||"",
    momReason: d.momReason||"",
  };
}


// ── Badge ─────────────────────────────────────────────────────────────────────
function Badge({v,big,T}) {
  if(v===null) return <span style={{display:"inline-flex",padding:"2px 9px",borderRadius:20,background:"#1e2433",color:"#374151",fontWeight:700,fontSize:big?"1rem":"0.8rem"}}>—</span>;
  const th=T?[70,40]:[7,4]; const bg=v>=th[0]?"#064e3b":v>=th[1]?"#78350f":"#7f1d1d"; const fg=v>=th[0]?"#6ee7b7":v>=th[1]?"#fcd34d":"#fca5a5";
  return <span style={{display:"inline-flex",padding:"2px 9px",borderRadius:20,background:bg,color:fg,fontWeight:900,fontSize:big?"1rem":"0.8rem"}}>{v.toFixed(1)}</span>;
}

// ── MarketTicker ──────────────────────────────────────────────────────────────
function MarketTicker({label, pctVal, lbl, onSet, placeholder}) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState("");
  const col = pctVal!==null ? (pctVal>=0?"#10b981":"#ef4444") : "#4a5568";
  const apply = () => {
    const n=parseFloat(val.replace(",","."));
    if(!isNaN(n)) onSet(n);
    setEditing(false); setVal("");
  };
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,background:"#1a1f2e",border:"1px solid "+col+"55",borderRadius:8,padding:"4px 11px"}}>
      <span style={{fontSize:"0.7rem",color:"#64748b",fontWeight:600}}>{label}</span>
      {pctVal!==null
        ? <span style={{fontSize:"0.82rem",fontWeight:700,color:col}}>{pctVal>=0?"▲":"▼"} {lbl}</span>
        : <span style={{fontSize:"0.72rem",color:"#374151"}}>—</span>}
      {editing ? (
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <input autoFocus type="number" step="0.01" value={val}
            onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")apply();if(e.key==="Escape")setEditing(false);}}
            placeholder={placeholder}
            style={{background:"#0f1117",border:"1px solid #374151",color:"#e2e8f0",padding:"2px 6px",borderRadius:5,fontSize:"0.72rem",width:72,outline:"none",fontFamily:"monospace"}}/>
          <button onClick={apply} style={{background:"#164e63",color:"#22d3ee",border:"none",padding:"2px 8px",borderRadius:5,cursor:"pointer",fontWeight:700}}>✓</button>
          <button onClick={()=>setEditing(false)} style={{background:"#1e2433",color:"#4a5568",border:"none",padding:"2px 6px",borderRadius:5,cursor:"pointer"}}>✕</button>
        </div>
      ) : (
        <button onClick={()=>setEditing(true)} title="עדכן ידנית" style={{background:"none",border:"none",color:"#374151",cursor:"pointer",fontSize:"0.72rem",padding:"0 3px"}}>✎</button>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [stocks,    setStocks]    = useState({});
  const [active,    setActive]    = useState(null);
  const [tab,       setTab]       = useState("summary");
  const [tickerIn,  setTickerIn]  = useState("");
  const [spPct,     setSpPct]     = useState(null);
  const [spLbl,     setSpLbl]     = useState(null);
  const [nqPct,     setNqPct]     = useState(null);
  const [nqLbl,     setNqLbl]     = useState(null);
  const [mktLoading,setMktLoading]= useState(false);
  const isFileProtocol = window.location.protocol === "file:";
  const [sortBy,    setSortBy]    = useState("total");
  const [sortDir,   setSortDir]   = useState("desc");
  const [filterMin, setFilterMin] = useState("");

  const applySP = (p) => { setSpPct(p); setSpLbl(makeLbl(p)); };

  const applyNQ = (p) => {
    setNqPct(p); setNqLbl(makeLbl(p));
    const sc = nqToScore(p);
    setStocks(prev => {
      const u={...prev};
      Object.keys(u).forEach(t => {
        u[t]={...u[t],mkt:{...u[t].mkt,
          scores:u[t].mkt.scores.map((s,i)=>i===1?sc:s),
          rawData:{...u[t].mkt.rawData,"נאסדק יומי":makeLbl(p)}
        }};
      });
      return u;
    });
  };

  const refreshMarkets = async () => {
    setMktLoading(true);
    setSpPct(null); setSpLbl(null);
    setNqPct(null); setNqLbl(null);
    try {
      const r = await fetchBothMarkets();
      console.log("fetchBothMarkets result:", r);
      if(r.sp!==null) applySP(r.sp);
      if(r.nq!==null) applyNQ(r.nq);
      if(r.sp===null && r.nq===null) console.warn("Both markets returned null — Yahoo may be blocking");
    } catch(e) { console.error("refreshMarkets error:", e); }
    setMktLoading(false);
  };

  const refreshMarketsRef = React.useRef(null);
  refreshMarketsRef.current = refreshMarkets;

  useEffect(() => {
    refreshMarketsRef.current();
    const iv = setInterval(() => refreshMarketsRef.current(), 30*60*1000);
    return () => clearInterval(iv);
  }, []);

  const runFetch = async (ticker) => {
    setStocks(p=>({...p,[ticker]:{...p[ticker],fetchStatus:"loading",fetchError:""}}));
    try {
      // Fetch live price and AI scores in parallel
      const [r, livePrice] = await Promise.all([
        fetchAndScoreViaAI(ticker),
        fetchLivePrice(ticker),
      ]);
      const price = livePrice ?? r.price;
      const nqs = nqPct!==null ? nqToScore(nqPct) : 0;
      const PAT = ["כוס וידית","דגל עולה","בסיס שטוח","VCP","Double Bottom","Ascending Triangle","Pocket Pivot"];
      setStocks(p=>({...p,[ticker]:{
        ...p[ticker], price:price, fetchStatus:"done",
        lastUpdated:new Date().toLocaleTimeString("he-IL"),
        news:[...(p[ticker].news||[]).filter(n=>!n.auto),...r.news],
        fund:{...p[ticker].fund,rawData:r.fundRaw,scores:r.fundScores,aiReason:r.fundReason},
        tech:{...p[ticker].tech,rawData:r.techRaw,scores:r.techScores,aiReason:r.techReason,
              patterns:PAT.map(n=>r.detectedPatterns.some(d=>d.toLowerCase().includes(n.toLowerCase())||n.toLowerCase().includes(d.toLowerCase()))),
              autoDetected:r.detectedPatterns},
        mom: {...p[ticker].mom, rawData:r.momRaw,scores:r.momScores,aiReason:r.momReason},
        mkt: {...p[ticker].mkt, scores:[spPct!==null?nqToScore(spPct):0, nqs]},
      }}));
    } catch(e) {
      setStocks(p=>({...p,[ticker]:{...p[ticker],fetchStatus:"error",fetchError:e.message}}));
    }
  };

  const addStock = () => {
    const t=tickerIn.trim().toUpperCase().replace(/[^A-Z.]/g,"");
    if(!t||stocks[t]||Object.keys(stocks).length>=15) return;
    setStocks(p=>({...p,[t]:mkStock(t)}));
    setActive(t); setTab("detail"); setTickerIn("");
    setTimeout(()=>runFetch(t),50);
  };

  const tickers  = Object.keys(stocks);
  const S        = active&&stocks[active] ? stocks[active] : null;
  const dotC     = s=>({done:"#10b981",loading:"#60a5fa",error:"#ef4444",idle:"#374151"})[s.fetchStatus];
  const statusC  = s=>({idle:"#4a5568",loading:"#60a5fa",done:"#10b981",error:"#ef4444"})[s.fetchStatus];
  const statusMsg= s=>({idle:"ממתין",loading:"⏳ שולף...",done:"✅ עודכן "+s.lastUpdated,error:"❌ "+s.fetchError})[s.fetchStatus]||"";
  const inp = {background:"#1e2433",border:"1px solid #374151",color:"#e2e8f0",padding:"5px 9px",borderRadius:6,fontSize:"0.75rem",outline:"none"};
  const card= c=>({background:"#13182288",border:"1px solid #2d3748",borderTop:`3px solid ${c}`,borderRadius:11,padding:16});

  return (
    <div dir="rtl" style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:"#0f1117",color:"#e2e8f0",minHeight:"100vh"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1f2e,#16213e)",padding:"12px 22px",borderBottom:"1px solid #2d3748"}}>
        <div style={{fontSize:"1.2rem",fontWeight:700,background:"linear-gradient(90deg,#60a5fa,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
          📊 מערכת דירוג מניות
        </div>
        <div style={{fontSize:"0.72rem",color:"#4a5568",marginTop:4,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span>AI Scoring</span>
          <MarketTicker label="S&P 500" pctVal={spPct} lbl={spLbl} onSet={applySP} placeholder="-1.20"/>
          <MarketTicker label="נאסדק"   pctVal={nqPct} lbl={nqLbl} onSet={applyNQ} placeholder="-2.01"/>
          <button onClick={refreshMarkets} disabled={mktLoading} title="רענן מדדים"
            style={{background:"#1e2433",border:"1px solid #374151",color:mktLoading?"#4a5568":"#60a5fa",
                    borderRadius:6,padding:"2px 9px",cursor:mktLoading?"default":"pointer",fontSize:"0.72rem"}}>
            {mktLoading?"⏳":"🔄"}
          </button>
        </div>
      </div>

      <div style={{maxWidth:1440,margin:"0 auto",padding:"16px 14px"}}>

        {/* File protocol warning */}
        {isFileProtocol && (
          <div style={{background:"#422006",border:"1px solid #92400e",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:"0.8rem",color:"#fcd34d"}}>
            ⚠️ הקובץ נפתח ישירות מהדיסק — קריאות רשת חסומות. הפעל שרת מקומי:
            <code style={{display:"block",marginTop:6,background:"#1a1000",padding:"4px 8px",borderRadius:4,color:"#86efac",fontSize:"0.75rem"}}>
              python3 -m http.server 8080 &nbsp;→&nbsp; http://localhost:8080/stock-rating.html
            </code>
          </div>
        )}
        {/* Add ticker */}
        <div style={{display:"flex",gap:9,marginBottom:14,flexWrap:"wrap"}}>
          <input value={tickerIn} onChange={e=>setTickerIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addStock()}
            placeholder="הוסף מניה (AAPL, TSLA...)" maxLength={10}
            style={{flex:1,minWidth:220,...inp,padding:"8px 12px",fontSize:"0.86rem"}}/>
          <button onClick={addStock} style={{background:"linear-gradient(135deg,#3b82f6,#6366f1)",color:"#fff",border:"none",padding:"8px 15px",borderRadius:8,fontSize:"0.82rem",fontWeight:700,cursor:"pointer"}}>+ הוסף</button>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:3,background:"#1a1f2e",padding:4,borderRadius:10,marginBottom:16,width:"fit-content"}}>
          {[["summary","📋 סיכום"],["detail","📊 נתונים וציונים"]].map(([t,l])=>

                      {[...S.news].sort((a,b)=>b.date.localeCompare(a.date)).map((n,i)=>{
                        const tbl={report:["📊 דוח","#1e3a5f","#60a5fa"],announce:["📣 הכרזה","#1a3a2a","#34d399"],news:["📰 חדשות","#2d1f40","#c4b5fd"]};
                        const [lbl,bg,fg]=tbl[n.type]||tbl.news;
                        return (
                          <div key={i} style={{background:"#0a0e18",border:"1px solid #1e2433",borderRadius:7,padding:"8px 10px",marginBottom:6,position:"relative"}}>
                            {!n.auto && (
                              <button onClick={()=>setStocks(p=>{const news=p[active].news.filter(item=>item!==n);return{...p,[active]:{...p[active],news}};})}
                                style={{position:"absolute",top:6,left:6,background:"none",border:"none",color:"#374151",cursor:"pointer",fontSize:"0.74rem"}}>✕</button>
                            )}
                            <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                              <span style={{fontSize:"0.68rem",color:"#4a5568",fontFamily:"monospace"}}>{n.date}</span>
                              <span style={{fontSize:"0.66rem",fontWeight:700,padding:"1px 6px",borderRadius:8,background:bg,color:fg}}>{lbl}</span>
                              {n.auto && <span style={{fontSize:"0.63rem",color:"#374151"}}>auto</span>}
                            </div>
                            <div style={{fontSize:"0.74rem",color:"#94a3b8",lineHeight:1.5}}>{n.text}</div>
                          </div>
                        );
                      })}
                      <NewsForm ticker={active} setStocks={setStocks} inp={inp}/>
                    </div>

                  </div>
                </>
              )
            }
          </div>
        )}
      </div>
    </div>
  );
}

function NewsForm({ticker, setStocks, inp}) {
  const [date, setDate] = useState(new Date().toISOString().split("T")[0]);
  const [type, setType] = useState("news");
  const [text, setText] = useState("");
  const add = () => {
    if(!text.trim()) return;
    setStocks(p=>({...p,[ticker]:{...p[ticker],news:[{date,type,text:text.trim(),auto:false},...p[ticker].news]}}));
    setText("");
  };
  return (
    <div style={{background:"#0a0e18",border:"1px solid #1e2433",borderRadius:8,padding:10,marginTop:8}}>
      <div style={{fontSize:"0.68rem",color:"#4a5568",fontWeight:600,marginBottom:6}}>+ הוסף ידיעה ידנית</div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp,width:125}}/>
        <select value={type} onChange={e=>setType(e.target.value)} style={inp}>
          <option value="report">📊 דוח</option>
          <option value="announce">📣 הכרזה</option>
          <option value="news">📰 חדשות</option>
        </select>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
          placeholder="תיאור (עובדות בלבד)..." maxLength={300} style={{...inp,flex:1,minWidth:150}}/>
        <button onClick={add} style={{background:"#164e63",color:"#22d3ee",border:"1px solid #06b6d4",padding:"5px 11px",borderRadius:6,fontSize:"0.74rem",fontWeight:600,cursor:"pointer"}}>+ הוסף</button>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
